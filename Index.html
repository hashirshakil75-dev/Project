<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizCard Studio — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-overlay">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-box">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="5" width="20" height="14" rx="2" fill="none" stroke="#F7F4EF" stroke-width="1.5"/>
            <line x1="2" y1="9" x2="22" y2="9" stroke="#F7F4EF" stroke-width="1.5"/>
            <circle cx="6" cy="14" r="1.5" fill="#F7F4EF"/>
          </svg>
        </div>
        <div>
          <div class="auth-brand-name">BizCard Studio</div>
          <div class="auth-brand-sub">Professional Business Card Generator</div>
        </div>
      </div>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Login</button>
        <button class="auth-tab" id="tabSignup" onclick="window.location.href='signup.html'">Sign Up</button>
      </div>

      <!-- Message Box -->
      <div class="auth-message" id="authMessage"></div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">

        <div class="auth-field">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="auth-field">
          <label for="loginPassword">Password</label>
          <div class="password-wrap">
            <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePassword('loginPassword', this)">👁</button>
          </div>
        </div>

        <div class="auth-remember-row">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <button type="button" class="forgot-link" onclick="showForgotMessage()">Forgot password?</button>
        </div>

        <button type="submit" class="auth-submit-btn" id="loginBtn">
          Login to BizCard Studio
        </button>

        <p class="auth-switch-text">
          Don't have an account?
          <button type="button" onclick="window.location.href='signup.html'">Sign Up Free</button>
        </p>

      </form>

      <!-- Footer Strip -->
      <div class="auth-footer-strip">
        🔒 Your data is stored locally &nbsp;·&nbsp; No credit card needed &nbsp;·&nbsp; Free forever
      </div>

    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Redirect to app if already logged in
    document.addEventListener('DOMContentLoaded', function () {
      var raw = localStorage.getItem('bizcardSession') || sessionStorage.getItem('bizcardSession');
      if (raw) {
        try {
          var session = JSON.parse(raw);
          if (session && session.email) {
            window.location.href = 'app.html';
          }
        } catch (e) {}
      }
    });
  </script>
</body>
</html>
