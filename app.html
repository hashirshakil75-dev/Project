<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizCard Studio — Card Designer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&family=Josefin+Sans:wght@300;400;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- MAIN APP -->
  <div id="mainApp">

    <!-- Top Navigation Bar -->
    <nav class="top-nav">
      <div class="nav-logo">
        <div class="logo-box logo-sm">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="5" width="20" height="14" rx="2" fill="none" stroke="#F7F4EF" stroke-width="1.5"/>
            <line x1="2" y1="9" x2="22" y2="9" stroke="#F7F4EF" stroke-width="1.5"/>
            <circle cx="6" cy="14" r="1.5" fill="#F7F4EF"/>
          </svg>
        </div>
        <span class="nav-brand">BizCard <span>Studio</span></span>
      </div>

      <div class="nav-center">
        <span class="nav-page-title">Card Designer</span>
      </div>

      <div class="nav-right">
        <div class="nav-user-info">
          <span class="nav-greeting" id="navGreeting">Hello, Ahmed</span>
          <div class="nav-avatar" id="navAvatar">A</div>
        </div>
        <button class="nav-logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </nav>

    <!-- App Body -->
    <div class="app">

      <!-- LEFT PANEL -->
      <aside class="panel">

        <!-- Template Selector -->
        <div class="section">
          <div class="sec-title">Choose Template</div>
          <div class="tpl-grid" id="templateGrid"></div>
        </div>

        <!-- Personal Information -->
        <div class="section">
          <div class="sec-title">Your Information</div>

          <div class="field">
            <label for="fName">Full Name *</label>
            <input type="text" id="fName" placeholder="e.g. Ahmed Raza Khan" maxlength="40" oninput="update()" />
          </div>

          <div class="field-row">
            <div class="field">
              <label for="fRole">Designation</label>
              <input type="text" id="fRole" placeholder="CEO / Developer" maxlength="35" oninput="update()" />
            </div>
            <div class="field">
              <label for="fCompany">Company</label>
              <input type="text" id="fCompany" placeholder="Company Name" maxlength="30" oninput="update()" />
            </div>
          </div>

          <div class="field">
            <label for="fPhone">Phone</label>
            <input type="tel" id="fPhone" placeholder="0300-1234567" maxlength="20" oninput="update()" />
          </div>

          <div class="field">
            <label for="fEmail">Email</label>
            <input type="email" id="fEmail" placeholder="ahmed@company.com" maxlength="40" oninput="update()" />
          </div>

          <div class="field">
            <label for="fWebsite">Website</label>
            <input type="text" id="fWebsite" placeholder="www.company.com" maxlength="35" oninput="update()" />
          </div>
        </div>

        <!-- Style Controls -->
        <div class="section">
          <div class="sec-title">Style</div>

          <div class="field-row">
            <div class="field">
              <label for="fAccent">Accent Color</label>
              <input type="color" id="fAccent" value="#C0392B" oninput="update()" />
            </div>
            <div class="field">
              <label for="fScale">Font Scale</label>
              <select id="fScale" onchange="update()">
                <option value="0.85">Compact</option>
                <option value="1" selected>Normal</option>
                <option value="1.12">Large</option>
              </select>
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="fBg">Card Background</label>
              <input type="color" id="fBg" value="#FDFBF8" oninput="update()" />
            </div>
            <div class="field">
              <label for="fQrContent">QR Code Links To</label>
              <select id="fQrContent" onchange="update()">
                <option value="phone">Phone Number</option>
                <option value="email">Email</option>
                <option value="website">Website</option>
                <option value="vcard">Full vCard</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Export -->
        <div class="section">
          <div class="sec-title">Export</div>

          <button class="btn btn-dark btn-full" onclick="downloadPNG()">
            ⬇ Download PNG (High-res)
          </button>

          <div class="action-row" style="margin-top: 8px;">
            <button class="btn btn-ghost btn-sm btn-full" onclick="copyToClipboard()">📋 Copy Image</button>
            <button class="btn btn-ghost btn-sm btn-full" onclick="window.print()">🖨 Print</button>
          </div>

          <button class="btn btn-outline-red btn-full" style="margin-top: 8px;" onclick="resetCard()">
            ↺ Reset Card
          </button>
        </div>

      </aside>

      <!-- RIGHT PANEL -->
      <main class="preview-panel">

        <div class="preview-bar">
          <div>
            <div class="preview-bar-title">Live Preview</div>
            <div class="preview-bar-sub">Standard size: 3.5 × 2 inches</div>
          </div>
          <div class="view-tabs">
            <button class="view-tab active" onclick="switchView('front', this)">Front</button>
            <button class="view-tab" onclick="switchView('back', this)">Back (QR)</button>
            <button class="view-tab" onclick="switchView('both', this)">Both Sides</button>
          </div>
        </div>

        <div class="canvas-area" id="canvasArea"></div>

      </main>

    </div>
  </div>

  <!-- Hidden QR render target -->
  <div id="qrRender"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script>
    // Guard: redirect to login if no session
    document.addEventListener('DOMContentLoaded', function () {
      var raw = localStorage.getItem('bizcardSession') || sessionStorage.getItem('bizcardSession');
      if (!raw) {
        window.location.href = 'index.html';
        return;
      }
      try {
        var session = JSON.parse(raw);
        if (!session || !session.email) {
          window.location.href = 'index.html';
          return;
        }
        // Initialize app
        setupNavBar(session);
        loadCardState(session.email);
        buildTemplateThumbs();
        syncFormToState();
        generateQR(function () {
          renderCard();
          renderView();
        });
      } catch (e) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
